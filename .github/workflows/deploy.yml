name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/kamran134/kamrankazimi:latest
          cache-from: type=registry,ref=ghcr.io/kamran134/kamrankazimi:buildcache
          cache-to: type=registry,ref=ghcr.io/kamran134/kamrankazimi:buildcache,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /root/kamrankazimi
            {
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              echo "NEXTAUTH_URL=https://kamrankazimi.dev"
              echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}"
            } > /root/kamrankazimi/.env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /root/kamrankazimi
            docker compose pull
            docker compose up -d --force-recreate
            echo "⏳ Waiting for container to be ready..."
            sleep 10
            echo "🔍 Checking container status..."
            docker compose ps
            echo "🔄 Running database migrations..."
            docker compose exec -T nextjs npx prisma migrate deploy || echo "⚠️ Migration failed, but deployment continues"
            sleep 10
            docker system prune -f -a
            echo "✅ Deployment completed!"